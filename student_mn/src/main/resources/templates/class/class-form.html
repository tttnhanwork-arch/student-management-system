<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.com">
<head>
    <meta charset="UTF-8">
    <title>Thêm/sửa lớp học</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body>
<h3>Thêm/sửa lớp học</h3>
<hr>
<form action="#" th:action="@{/class/save}" th:object="${class}" method="post">
  <input type="hidden" th:field="*{id_class}">
  <input type="text" th:field="*{name}" placeholder="Nhập tên lớp" class="form-control w-25 mb-4">
  <input type="number" th:field="*{grade}" placeholder="Nhập khối lớp" class="form-control w-25 mb-4">
  <input type="text" th:field="*{year}" placeholder="Nhập niên khóa" class="form-control w-25 mb-4">
    <select name="id_school" class="form-control w-25 mb-4">
        <option value="">-- Chọn trường --</option>
        <option th:each="school : ${schools}"
                th:value="${school.id_school}"
                th:text="${school.name}">
        </option>
    </select>
  <button type="submit" class="btn btn-success col-2 mb-4">Lưu</button>
</form>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>

</body>
</html>
