<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.com">
<head>
    <meta charset="UTF-8">
    <title>Thêm/sửa nhân viên</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body>
<h3>Thêm/sửa nhân viên</h3>
<hr>
<form action="#" th:action="@{/employee/save}" th:object="${employee}" method="post">
    <input type="hidden" th:field="*{id_employee}">
    <input type="text" th:field="*{lastName}" placeholder="Nhập họ đệm" class="form-control w-25 mb-4">
    <input type="text" th:field="*{firstName}" placeholder="Nhập tên" class="form-control w-25 mb-4">
    <input type="text" th:field="*{phone}" placeholder="Nhập số điện thoại" class="form-control w-25 mb-4">
    <input type="email" th:field="*{email}" placeholder="Nhập email" class="form-control w-25 mb-4">
    <input type="text" th:field="*{role}" placeholder="Nhập vị trí việc làm" class="form-control w-25 mb-4">
    <button type="submit" class="btn btn-success col-2">Lưu</button>
</form>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
