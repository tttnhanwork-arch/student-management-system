<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.com">
<head>
    <meta charset="UTF-8">
    <title>Trang chủ</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body>
<div class="container">
    <div class="row">
        <div class="col-sm-6">
        <h3>Hệ thống quản lý sinh viên</h3>
        <h4>Trang chủ</h4>
        </div>
        <div class="col-sm-6">
           Xin chào <b><span sec:authentication="principal.username"></span></b>
            <form action="#" th:action="@{/logout}" method="post">
<input type="submit" value="Đăng xuất" class="btn btn-info">
            </form>
        </div>
    </div>
    <hr>
    <a th:href="@{/school}" class="btn btn-success mb-4">Trường</a>
    <a th:href="@{/class}" class="btn btn-success mb-4">Lớp</a>
    <a th:href="@{/employee}" class="btn btn-success mb-4">Nhân viên</a>
    <a th:href="@{/student}" class="btn btn-success mb-4">Học sinh</a>
    <a th:href="@{/parent}" class="btn btn-success mb-4">Phụ huynh</a>
    <a th:href="@{/subject}" class="btn btn-success mb-4">Môn học</a>
    <a th:href="@{/reportcard}" class="btn btn-success mb-4">Học bạ</a>
    <a th:href="@{/scoresheet}" class="btn btn-success mb-4">Phiếu điểm</a>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</div>
</body>
</html>
