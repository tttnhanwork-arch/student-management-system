<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.com">
<head>
    <meta charset="UTF-8">
    <title>Đăng ký</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <style>
        div {
        margin-bottom: 10px;
        margin-top:10px
        }
    </style>
</head>
<body>
<div class="container">
    <form action="#" th:action="@{/register/process}" th:object="${registerUser}" method="post">
        <div th:if="${my_error}" class="alert alert-danger">
            <span th:text="${my_error}"></span>
        </div>
        <div>
            <input type="text" th:field="*{username}" placeholder="Tên đăng nhập(*)" class="form-control"/>
            <div th:if="${#fields.hasErrors('username')}">
                <ul>
                    <li th:each="e:${#fields.errors('username')}" th:text="${e}"></li>
                </ul>
            </div>
        </div>
        <div>
            <input type="password" th:field="*{password}" placeholder="Mật khẩu(*)" class="form-control"/>
            <div th:if="${#fields.hasErrors('password')}">
                <ul>
                    <li th:each="e:${#fields.errors('password')}" th:text="${e}"></li>
                </ul>
            </div>
        </div>
        <div>
            <input type="text" th:field="*{lastName}" placeholder="Họ đệm(*)" class="form-control"/>
            <div th:if="${#fields.hasErrors('lastName')}">
                <ul>
                    <li th:each="e:${#fields.errors('lastName')}" th:text="${e}"></li>
                </ul>
            </div>
        </div>
        <div>
            <input type="text" th:field="*{firstName}" placeholder="Tên(*)" class="form-control"/>
            <div th:if="${#fields.hasErrors('firstName')}">
                <ul>
                    <li th:each="e:${#fields.errors('firstName')}" th:text="${e}"></li>
                </ul>
            </div>
        </div>
        <div>
            <input type="email" th:field="*{email}" placeholder="Email" class="form-control"/>
            <div th:if="${#fields.hasErrors('email')}">
                <ul>
                    <li th:each="e:${#fields.errors('email')}" th:text="${e}"></li>
                </ul>
            </div>
        </div>
        <div>
            <button type="submit" class="btn btn-success">Đăng ký</button>
        </div>
    </form>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>

</body>
</html>
