<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.com">
<head>
  <meta charset="UTF-8">
  <title>Thêm/sửa học bạ</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body>
<h3>Thêm/sửa học bạ</h3>
<hr>
<form action="#" th:action="@{/reportcard/save}" th:object="${reportcard}" method="post">
  <input type="hidden" th:field="*{id_card}">
  <input type="text" th:field="*{semester}" placeholder="Nhập học kỳ" class="form-control w-25 mb-4">
  <input type="text" th:field="*{GPA}" placeholder="Nhập điểm trung bình" class="form-control w-25 mb-4">
  <input type="text" th:field="*{conduct}" placeholder="Nhập hạnh kiểm" class="form-control w-25 mb-4">
  <input type="text" th:field="*{comment}" placeholder="Nhập nhận xét của GVCN" class="form-control w-25 mb-4">
  <button type="submit" class="btn btn-success col-2 mb-4">Lưu</button>
</form>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
