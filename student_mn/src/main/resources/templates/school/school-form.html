<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.com">
<head>
    <meta charset="UTF-8">
    <title>Thêm/sửa trường</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body>
<h3>Thêm/sửa trường </h3>
<hr>
<form action="#" th:action="@{/school/save}" th:object="${school}" method="post">
  <input type="hidden" th:field="*{id_school}">
  <input type="text" th:field="*{name}" placeholder="Nhập tên trường" class="form-control w-25 mb-4">
  <input type="text" th:field="*{address}" placeholder="Nhập địa chỉ trường" class="form-control w-25 mb-4">
  <input type="text" th:field="*{phoneNumber}" placeholder="Nhập số điện thoại của trường" class="form-control w-25 mb-4">
  <input type="text" th:field="*{principal}" placeholder="Nhập tên Hiệu trưởng" class="form-control w-25 mb-4">
  <button type="submit" class="btn btn-success col-2 mb-4">Lưu</button>
</form>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
