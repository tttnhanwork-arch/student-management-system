<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.com">
<head>
  <meta charset="UTF-8">
  <title>Thêm/sửa phiếu điểm</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

</head>
<body>
<h3>Thêm/sửa phiếu điểm</h3>
<form action="#" th:action="@{/scoresheet/save}" th:object="${scoresheet}" method="post">
  <input type="hidden" th:field="*{id_sheet}">
  <input type="date" th:field="*{dayOfTest}" placeholder="Nhập ngày kiểm tra" class="form-control w-25 mb-4"/>
  <input type="text" th:field="*{score}" placeholder="Nhập điểm" class="form-control w-25 mb-4"/>
  <button type="submit" class="btn btn-success col-2">Lưu</button>
</form>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>

</body>
</html>
