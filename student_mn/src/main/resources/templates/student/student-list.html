<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.com">
<head>
    <meta charset="UTF-8">
    <title>Danh sách học sinh</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

</head>
<body>
<h3>Danh sách học sinh</h3>
<hr/>
<a th:href="@{/student/create}" class="btn btn-success btn-sm mb-4">Thêm mới</a>
<table class="table table-bordered table-sm table-striped">
    <thead class="table-danger">
    <tr>
        <th>Id</th>
        <th>Họ đệm</th>
        <th>Tên</th>
        <th>Ngày sinh</th>
        <th>Email</th>
        <th>Lớp</th>
        <th>Phụ huynh</th>
        <th>Xử lý</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="student:${students}">
        <td th:text="${student.id_student}"></td>
        <td th:text="${student.lastName}"></td>
        <td th:text="${student.firstName}"></td>
        <td th:text="${student.DOB}"></td>
        <td th:text="${student.email}"></td>
        <td th:text="${student.aClass != null ? student.aClass.name : 'N/A'}"></td>
        <td th:text="${student.parent != null ? student.parent.firstName : 'N/A'}"></td>
        <td>
            <a sec:authorize="hasRole('ADMIN')" th:href="@{/student/update(id=${student.id_student})}" class="btn btn-info btn-sm">Chỉnh sửa</a>
            <a sec:authorize="hasRole('ADMIN')" th:href="@{/student/delete(id=${student.id_student})} " onclick="return confirm('Bạn có chắc muốn xóa học sinh này không?')" class="btn btn-danger btn-sm">Xóa</a>
        </td>
    </tr>
    </tbody>
</table>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>

</body>
</html>
